version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: moto-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moto_erp}
      POSTGRES_USER: ${POSTGRES_USER:-moto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moto_user} -d ${POSTGRES_DB:-moto_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moto-net

  # ── Backend (Express) ───────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: moto-erp-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SERVER_PORT: ${SERVER_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-moto_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-moto_erp}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - moto-net

  # ── Frontend (React/Vite) ───────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: moto-erp-client
    restart: unless-stopped
    networks:
      - moto-net

  # ── Nginx (Reverse Proxy) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: moto-erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - client
    networks:
      - moto-net

volumes:
  postgres_data:

networks:
  moto-net:
    driver: bridge
